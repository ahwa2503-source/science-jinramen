<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SCIENCE CORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{

overflow:hidden;
background:#03040b;
color:white;

}

/* 배경 */

#bg{

position:fixed;
width:100%;
height:100%;
left:0;
top:0;

background:

radial-gradient(circle at center,#082548 0%,#02040b 70%);

z-index:-20;

}

/* 별 */

.star{

position:absolute;

width:2px;
height:2px;

background:white;

border-radius:50%;

animation:twinkle 3s infinite;

}

@keyframes twinkle{

0%{opacity:.2;}

50%{opacity:1;}

100%{opacity:.2;}

}

/* 파티클 */

.particle{

position:absolute;

width:4px;
height:4px;

border-radius:50%;

background:#00d8ff;

box-shadow:

0 0 8px #00d8ff,

0 0 20px #00d8ff;

animation:floatParticle linear infinite;

}

@keyframes floatParticle{

0%{

transform:translateY(100vh);

opacity:0;

}

20%{

opacity:1;

}

80%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}

/* 스캔라인 */

.scan{

position:fixed;

top:-200px;

left:0;

width:100%;

height:200px;

background:

linear-gradient(

transparent,

rgba(0,255,255,.2),

transparent);

animation:scan 6s linear infinite;

pointer-events:none;

}

@keyframes scan{

0%{

top:-200px;

}

100%{

top:120%;

}

}

/* 제목 */

.title{

position:absolute;

top:15%;

left:50%;

transform:translateX(-50%);

font-size:70px;

font-weight:900;

letter-spacing:10px;

color:#7ee7ff;

text-shadow:

0 0 10px cyan,

0 0 20px cyan,

0 0 40px cyan,

0 0 80px cyan;

animation:pulse 2s infinite;

}

@keyframes pulse{

50%{

text-shadow:

0 0 15px cyan,

0 0 30px cyan,

0 0 60px cyan,

0 0 120px cyan;

}

}

/* 부제목 */

.subtitle{

position:absolute;

top:28%;

left:50%;

transform:translateX(-50%);

font-size:20px;

letter-spacing:5px;

color:#98eaff;

opacity:.8;

}

/* 버튼 */

#start{

position:absolute;

top:55%;

left:50%;

transform:translate(-50%,-50%);

width:330px;

height:90px;

border:2px solid cyan;

background:rgba(0,255,255,.08);

color:white;

font-size:34px;

cursor:pointer;

letter-spacing:5px;

transition:.3s;

box-shadow:

0 0 20px cyan;

overflow:hidden;

}

#start:hover{

transform:translate(-50%,-50%) scale(1.08);

box-shadow:

0 0 30px cyan,

0 0 70px cyan,

0 0 120px cyan;

background:rgba(0,255,255,.18);

}

#start:before{

content:"";

position:absolute;

left:-100%;

top:0;

width:100%;

height:100%;

background:

linear-gradient(

90deg,

transparent,

rgba(255,255,255,.5),

transparent);

transition:.7s;

}

#start:hover:before{

left:120%;

}

/* 시계 */

.clock{

position:absolute;

bottom:30px;

left:30px;

font-size:20px;

color:#78e7ff;

letter-spacing:3px;

}

/* 시스템 정보 */

.system{

position:absolute;

right:30px;

top:30px;

width:250px;

padding:20px;

border:1px solid rgba(0,255,255,.5);

background:rgba(0,255,255,.05);

backdrop-filter:blur(5px);

line-height:35px;

}

.system h2{

margin-bottom:15px;

color:#6be7ff;

}

/* 공식 */

.formula{

position:absolute;

color:rgba(0,255,255,.35);

font-size:22px;

animation:formulaMove linear infinite;

user-select:none;

}

@keyframes formulaMove{

0%{

transform:translateY(100vh);

}

100%{

transform:translateY(-120vh);

}

}
/* ========================= */
/* SOLAR SYSTEM */
/* ========================= */

#solarSystem{
position:absolute;
left:6%;
top:50%;
transform:translateY(-50%);
width:520px;
height:520px;
pointer-events:none;
}

.sun{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:80px;
height:80px;

border-radius:50%;

background:radial-gradient(circle,#fff59d,#ffc107,#ff9800);

box-shadow:
0 0 25px #ffd54f,
0 0 60px orange,
0 0 120px gold;

}

.orbit{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

border:1px solid rgba(0,255,255,.08);

border-radius:50%;

animation:rotate linear infinite;

}

@keyframes rotate{

from{

transform:
translate(-50%,-50%)
rotate(0deg);

}

to{

transform:
translate(-50%,-50%)
rotate(360deg);

}

}

.planet{

position:absolute;

top:50%;

border-radius:50%;

transform:translateY(-50%);

box-shadow:0 0 10px rgba(255,255,255,.6);

}
</style>

</head>

<body>

<div id="bg"></div>

<div class="scan"></div>

<h1 class="title">
SCIENCE CORE
</h1>

<div class="subtitle">
NEXT GENERATION AI LAB
</div>

<button id="start">

시작하기

</button>

<div class="clock" id="clock"></div>

<div class="system">

<h2>SYSTEM</h2>

Temperature :
<span id="temp"></span>

<br>

CPU :
<span id="cpu"></span>

<br>

Status :
ONLINE

</div>

<script>

// 별

for(let i=0;i<250;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(s);

}

// 파티클

for(let i=0;i<120;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=6+Math.random()*8+"s";

p.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(p);

}

// 공식

let list=[

"E = mc²",

"H₂O",

"DNA",

"NaCl",

"CO₂",

"A=T",

"G≡C",

"F=ma",

"AI"

];

for(let i=0;i<30;i++){

let f=document.createElement("div");

f.className="formula";

f.innerHTML=list[Math.floor(Math.random()*list.length)];

f.style.left=Math.random()*100+"vw";

f.style.animationDuration=15+Math.random()*20+"s";

f.style.fontSize=15+Math.random()*20+"px";

document.body.appendChild(f);

}

function clock(){

let d=new Date();

document.getElementById("clock").innerHTML=

d.toLocaleTimeString();

}

setInterval(clock,1000);

clock();

function sys(){

document.getElementById("temp").innerHTML=

(22+Math.random()*5).toFixed(1)+"°C";

document.getElementById("cpu").innerHTML=

Math.floor(70+Math.random()*30)+"%";

}

setInterval(sys,1000);

sys();

document.getElementById("start").onclick=()=>{

document.body.style.transition="1.5s";

document.body.style.transform="scale(1.4)";

document.body.style.opacity="0";

setTimeout(()=>{

location.href="main.html";

},1500);

}

</script>

</body>
</html>
