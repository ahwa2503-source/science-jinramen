
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>SCIENCE CORE</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap"
    rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===============================
     SPACE BACKGROUND
================================ -->

<canvas id="space"></canvas>

<div id="nebula"></div>

<div id="grid"></div>

<div id="scanLine"></div>

<!-- ===============================
     HUD
================================ -->

<div id="hud"></div>
<div id="hud">

    <div class="radar">
        <div class="radar-ring"></div>
        <div class="radar-ring"></div>
        <div class="radar-ring"></div>
        <div class="radar-line"></div>
    </div>

</div>
<!-- ===============================
     SOLAR SYSTEM
================================ -->

<div id="solarSystem"></div>

<!-- ===============================
     DNA
================================ -->

<div id="dna"></div>

<!-- ===============================
     CURSOR
================================ -->

<div id="cursorGlow"></div>

<!-- ===============================
     TITLE
================================ -->

<div id="center">

    <h1>

        SCIENCE

        <span>

            CORE

        </span>

    </h1>

    <p>

        NEXT GENERATION AI LAB

    </p>

    <button id="startButton">

        START

    </button>

</div>

<!-- ===============================
     SYSTEM PANEL
================================ -->

    <div>

    FPS

    <span id="fps">

        60

    </span>

</div>
<div id="systemPanel">

    <h2>

        SYSTEM

    </h2>

    <div>

        STATUS

        <span id="status">

            ONLINE

        </span>

    </div>

    <div>

        CPU

        <span id="cpu">

            0%

        </span>

    </div>

    <div>

        TEMP

        <span id="temp">

            0°C

        </span>

    </div>

    <div>

        TIME

        <span id="clock">

            00:00:00

        </span>

    </div>

</div>

<!-- ===============================
     PLANET INFO
================================ -->

<div id="planetInfo">

    <h2 id="planetName">

        SCIENCE CORE

    </h2>

    <p id="planetText">

        Move your mouse over a planet.

    </p>

</div>

<!-- ===============================
     BOOT SCREEN
================================ -->

<div id="bootScreen">

    <div id="bootLogo">

        SCIENCE CORE

    </div>

    <div id="bootText">

        Initializing...

    </div>

    <div id="bootBar">

        <div id="bootProgress"></div>

    </div>

</div>

<!-- ===============================
     WARP
================================ -->

<div id="warp"></div>

<script src="script.js"></script>

</body>
</html>
