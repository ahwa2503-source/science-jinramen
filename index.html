<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCIENCE CORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;
background:#000;
color:white;
font-family:Arial,sans-serif;

}


/* 우주 */

#space{

position:fixed;
width:100%;
height:100%;

background:

radial-gradient(circle at center,
#16264d,
#000 75%);

}




.star{

position:absolute;

width:2px;
height:2px;

background:white;

border-radius:50%;

animation:twinkle 3s infinite;

}


@keyframes twinkle{

50%{

opacity:.2;

}

}




/* 부팅 화면 */


#boot{


position:absolute;

width:100%;
height:100%;


display:flex;

align-items:center;

justify-content:center;

flex-direction:column;


z-index:5;


}




.logo{


font-size:70px;

letter-spacing:15px;


color:#00eaff;


text-shadow:

0 0 20px cyan,
0 0 80px cyan;


}




.sub{

margin-top:20px;

color:#aaa;

letter-spacing:5px;

}





.panel{


margin-top:40px;


width:420px;


padding:25px;


border:1px solid cyan;


background:rgba(0,20,50,.6);


box-shadow:0 0 30px cyan;


}



.line{

margin:15px;

color:#00ffff;

}



.loading{


height:5px;

background:#111;

}


.bar{

height:100%;

width:0%;

background:cyan;

animation:load 4s forwards;

}


@keyframes load{

to{

width:100%;

}

}





button{


margin-top:40px;

padding:18px 80px;


font-size:25px;

letter-spacing:8px;


background:none;

border:2px solid cyan;

color:white;


cursor:pointer;


}


button:hover{

background:cyan;

color:black;

box-shadow:0 0 50px cyan;

}




/* 태양계 */


#solar{


display:none;


position:absolute;

width:100%;

height:100%;


background:

radial-gradient(circle,#101b35,#000);


}



.sun{


position:absolute;


left:50%;

top:50%;


transform:translate(-50%,-50%);


width:160px;

height:160px;


border-radius:50%;


background:

radial-gradient(circle,#fff,#ffd000,#ff5500);


box-shadow:

0 0 80px orange;


animation:pulse 3s infinite;


}



@keyframes pulse{

50%{

scale:1.15;

}

}


    /* =====================
   PLANETS
===================== */


.orbit{

position:absolute;

left:50%;
top:50%;


border:1px solid rgba(0,255,255,.2);


border-radius:50%;


animation:rotate linear infinite;

}



@keyframes rotate{


from{

transform:
translate(-50%,-50%)
rotate(0deg);

}


to{

transform:
translate(-50%,-50%)
rotate(360deg);

}

}



.planet{


position:absolute;


top:-12px;

left:50%;


transform:translateX(-50%);


border-radius:50%;


box-shadow:

inset -10px -10px 15px black;

}




.mercury{

width:230px;
height:230px;

animation-duration:8s;

}


.mercury .planet{

width:15px;
height:15px;

background:#888;

}





.venus{

width:330px;
height:330px;

animation-duration:12s;

}



.venus .planet{

width:25px;
height:25px;

background:#d9a052;

}





.earth{

width:450px;
height:450px;

animation-duration:18s;

}



.earth .planet{

width:35px;
height:35px;


background:

linear-gradient(
120deg,
#2b8cff,
#19a85b,
#003b88
);


box-shadow:

0 0 20px cyan;

}





.mars{

width:570px;
height:570px;

animation-duration:25s;

}



.mars .planet{

width:25px;
height:25px;

background:#b84422;

}





.jupiter{

width:720px;
height:720px;

animation-duration:35s;

}



.jupiter .planet{

width:75px;
height:75px;


background:

repeating-linear-gradient(
0deg,
#d69a60,
#b87945 12px,
#f0c999 25px
);


}




.saturn{

width:860px;
height:860px;

animation-duration:45s;

}



.saturn .planet{

width:60px;
height:60px;


background:#d9bd72;


}



.saturn .planet::after{


content:"";


position:absolute;


width:130px;

height:35px;


left:-35px;

top:12px;


border:4px solid #d4c08a;


border-radius:50%;


}




.uranus{

width:1000px;
height:1000px;

animation-duration:60s;

}


.uranus .planet{

width:35px;

height:35px;

background:#75eaff;

}





.neptune{

width:1150px;

height:1150px;

animation-duration:75s;

}



.neptune .planet{

width:35px;

height:35px;

background:#315cff;

}





.hud{


position:absolute;


top:30px;

left:30px;


padding:20px;


border:1px solid cyan;


background:rgba(0,20,40,.7);


color:#00ffff;


}



</style>

</head>



<body>



<div id="space"></div>



<div id="boot">


<div class="logo">
SCIENCE CORE
</div>


<div class="sub">
UNIVERSE EXPLORATION SYSTEM
</div>



<div class="panel">


<div class="line">
✔ Quantum Engine ONLINE
</div>


<div class="line">
✔ Solar Database CONNECTED
</div>


<div class="line">
✔ Navigation READY
</div>


<div class="loading">

<div class="bar"></div>

</div>


</div>



<button id="start">
START
</button>



</div>





<div id="solar">


<div class="hud">

<h2>
SCIENCE CORE // SOLAR SYSTEM
</h2>

<p>
STATUS : ONLINE
</p>

<p>
PLANETS : 8
</p>


</div>




<div class="sun"></div>



<div class="orbit mercury">
<div class="planet"></div>
</div>


<div class="orbit venus">
<div class="planet"></div>
</div>


<div class="orbit earth">
<div class="planet"></div>
</div>


<div class="orbit mars">
<div class="planet"></div>
</div>


<div class="orbit jupiter">
<div class="planet"></div>
</div>


<div class="orbit saturn">
<div class="planet"></div>
</div>


<div class="orbit uranus">
<div class="planet"></div>
</div>


<div class="orbit neptune">
<div class="planet"></div>
</div>



</div>






<script>


// 별 생성


const space =
document.getElementById("space");


for(let i=0;i<500;i++){


let s=document.createElement("div");


s.className="star";


s.style.left=Math.random()*100+"%";


s.style.top=Math.random()*100+"%";


space.appendChild(s);


}





// START


const start =
document.getElementById("start");


const boot =
document.getElementById("boot");


const solar =
document.getElementById("solar");



start.onclick=function(){


boot.style.transition="1s";


boot.style.opacity="0";



setTimeout(()=>{


boot.style.display="none";


solar.style.display="block";


},1000);



}



</script>


</body>

</html>
