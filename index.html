<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCIENCE CORE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>

<header>
    <h1>SCIENCE CORE</h1>
    <p>Explore The Universe</p>
</header>


<section class="solar-system">

    <div class="sun"></div>

    <div class="orbit mercury">
        <div class="planet"></div>
    </div>

    <div class="orbit venus">
        <div class="planet"></div>
    </div>

    <div class="orbit earth">
        <div class="planet">
            <span>🌎</span>
        </div>
    </div>

    <div class="orbit mars">
        <div class="planet"></div>
    </div>

    <div class="orbit jupiter">
        <div class="planet"></div>
    </div>

    <div class="orbit saturn">
        <div class="planet">
            <div class="ring"></div>
        </div>
    </div>

    <div class="orbit uranus">
        <div class="planet"></div>
    </div>

    <div class="orbit neptune">
        <div class="planet"></div>
    </div>


</section>


<div class="center">

    <h2>우주의 비밀을 탐험하세요</h2>

    <button onclick="start()">
        시작하기
    </button>

</div>


<script src="script.js"></script>

</body>
</html>
