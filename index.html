<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPACE ODYSSEY</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;

overflow:hidden;

background:#000;

color:white;

font-family:
'Segoe UI',
sans-serif;

}



/* =================
우주 배경
================= */


.space{

position:absolute;

width:100%;

height:100%;

background:

radial-gradient(
circle at center,
#162447,
#000 70%
);

}



/* 별 */

.star{

position:absolute;

width:3px;

height:3px;

background:white;

border-radius:50%;

animation:blink 3s infinite;

}


@keyframes blink{


50%{

opacity:.2;

}


}



/* =================
마우스 빛
================= */


.light{

position:fixed;

width:300px;

height:300px;

pointer-events:none;

border-radius:50%;


background:

radial-gradient(
circle,
rgba(0,255,255,.25),
transparent 70%
);


transform:translate(-50%,-50%);

z-index:5;

}





/* =================
메인 화면
================= */


.main{


position:relative;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

z-index:2;


}




/* 제목 */


.title{

position:absolute;

top:8%;

text-align:center;

}


.title h1{


font-size:70px;

letter-spacing:20px;


text-shadow:

0 0 20px cyan,

0 0 50px blue;


}



.title p{

font-size:20px;

color:#aaa;

letter-spacing:8px;

}




/* =================
태양
================= */


.sun{


position:absolute;


width:120px;

height:120px;


border-radius:50%;


background:

radial-gradient(
circle,
#fff700,
orange,
red
);



box-shadow:

0 0 50px orange,

0 0 120px yellow;


}



/* =================
행성 공통
================= */


.orbit{


position:absolute;

border-radius:50%;

animation:rotate linear infinite;


}


.planet{


position:absolute;


border-radius:50%;


box-shadow:

inset -15px -15px 25px #000,

0 0 20px white;


cursor:pointer;


}



@keyframes rotate{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}


}




/* 시작 버튼 */


.start{


position:absolute;

bottom:8%;


padding:

18px 70px;


font-size:30px;


border-radius:50px;


background:transparent;


border:2px solid cyan;


color:white;


cursor:pointer;


box-shadow:

0 0 30px cyan;


transition:.5s;


}



.start:hover{


background:cyan;


color:black;


transform:scale(1.15);


}


</style>

</head>


<body>


<div class="space"></div>


<div class="light"></div>



<div class="main">


<div class="title">

<h1>SPACE</h1>

<p>EXPLORE THE UNIVERSE</p>

</div>



<div class="sun"></div>



<div id="solar"></div>



<button class="start">
START 🚀
</button>


</div>
<script>


// ======================
// 별 생성
// ======================


const space=document.querySelector(".space");


for(let i=0;i<300;i++){

let star=document.createElement("div");

star.className="star";


star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";


let size=Math.random()*3+1;

star.style.width=size+"px";

star.style.height=size+"px";


star.style.animationDelay=
Math.random()*5+"s";


space.appendChild(star);

}





// ======================
// 행성 데이터
// ======================


const planets=[


{
name:"수성",
size:18,
distance:100,
color:"#aaa",
speed:12
},


{
name:"금성",
size:30,
distance:150,
color:"#d9a441",
speed:18
},


{
name:"지구",
size:34,
distance:200,
color:"#1687ff",
speed:25
},


{
name:"화성",
size:25,
distance:250,
color:"#c1440e",
speed:32
},


{
name:"목성",
size:75,
distance:330,
color:"#d6a06b",
speed:45
},


{
name:"토성",
size:65,
distance:420,
color:"#e6d58a",
speed:60
},


{
name:"천왕성",
size:45,
distance:500,
color:"#7de3ff",
speed:75
},


{
name:"해왕성",
size:42,
distance:570,
color:"#4169e1",
speed:90
}


];





const solar=document.getElementById("solar");




// ======================
// 행성 생성
// ======================


planets.forEach((p,index)=>{


// 궤도 생성

let orbit=document.createElement("div");


orbit.className="orbit";


orbit.style.width=
p.distance*2+"px";


orbit.style.height=
p.distance*2+"px";


orbit.style.border=
"1px solid rgba(255,255,255,.15)";


orbit.style.animationDuration=
p.speed+"s";



let planet=document.createElement("div");


planet.className="planet";


planet.style.width=
p.size+"px";


planet.style.height=
p.size+"px";


planet.style.background=
p.color;



planet.style.left=
"calc(50% - "+p.size/2+"px)";


planet.style.top=
"-"+p.size/2+"px";



orbit.appendChild(planet);


solar.appendChild(orbit);



});





// ======================
// 토성 고리
// ======================


let saturn=
document.querySelectorAll(".planet")[5];


let ring=document.createElement("div");


ring.style.position="absolute";

ring.style.width="150%";

ring.style.height="40%";

ring.style.left="-25%";

ring.style.top="30%";


ring.style.border=
"3px solid rgba(255,230,150,.8)";


ring.style.borderRadius="50%";


ring.style.transform=
"rotate(-25deg)";


saturn.appendChild(ring);





// ======================
// 마우스 빛 이동
// ======================


const light=document.querySelector(".light");


document.addEventListener("mousemove",(e)=>{


light.style.left=e.clientX+"px";


light.style.top=e.clientY+"px";


});



</script>
<style>


/* ======================
HUD UI
====================== */


.hud{


position:absolute;

top:30px;

left:30px;


padding:20px;


border-left:3px solid cyan;


background:

rgba(0,0,0,.4);


font-size:14px;


letter-spacing:3px;


color:#8ff;


z-index:10;


}





/* 행성 정보창 */


.info{


position:absolute;


right:40px;

top:50%;


transform:translateY(-50%);


width:280px;


padding:25px;


background:

rgba(0,0,0,.75);


border:

1px solid cyan;


border-radius:20px;


box-shadow:

0 0 40px cyan;


display:none;


z-index:20;


}



.info h2{


color:#00ffff;


margin-bottom:15px;


font-size:30px;


}



.info p{


line-height:1.7;


color:#ddd;


}



/* 시작 연출 */


.zoom{


animation:

zoomSpace 3s forwards;


}



@keyframes zoomSpace{


to{


transform:scale(5);


opacity:0;


}


}



/* 클릭 효과 */


.planet:active{


box-shadow:

0 0 80px cyan;


}



@media(max-width:700px){


.title h1{


font-size:40px;

letter-spacing:10px;


}


.start{


font-size:20px;

padding:15px 40px;


}


.info{


right:10px;

width:240px;


}


}


</style>





<div class="hud">

SYSTEM ONLINE<br>
GALAXY MAP : ACTIVE<br>
PLANETS : 8<br>
MISSION : EXPLORE

</div>



<div class="info" id="info">

<h2 id="planetName">
</h2>

<p id="planetDesc">
</p>

</div>




<script>


// ======================
// 행성 설명
// ======================


const descriptions=[


"태양과 가장 가까운 작은 암석 행성.",

"강력한 온실효과를 가진 뜨거운 행성.",

"생명체가 존재하는 푸른 행성.",

"붉은색 표면을 가진 화성.",

"태양계 최대의 가스 행성.",

"아름다운 고리를 가진 행성.",

"옆으로 누워 회전하는 얼음 행성.",

"태양계 가장 먼 푸른 행성."

];



const allPlanets=
document.querySelectorAll(".planet");


const info=
document.getElementById("info");



allPlanets.forEach((planet,index)=>{


planet.addEventListener("click",()=>{


document.getElementById("planetName")
.innerHTML=
planets[index].name;



document.getElementById("planetDesc")
.innerHTML=
descriptions[index];



info.style.display="block";



});



});




// ======================
// START 버튼
// ======================


const start=
document.querySelector(".start");


start.onclick=()=>{


document.querySelector(".main")
.classList.add("zoom");


start.innerHTML=
"ENTERING SPACE 🚀";



setTimeout(()=>{


document.querySelector(".main")
.classList.remove("zoom");


start.innerHTML=
"START 🚀";


},3000);



};




</script>
