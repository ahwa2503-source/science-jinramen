<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SCIENCE CORE</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- 우주 배경 -->

<div id="universe">

    <div id="nebula"></div>

    <div id="stars"></div>

    <div id="particles"></div>

</div>




<!-- 메인 화면 -->

<main class="core">


    <!-- 상단 로고 -->

    <header class="header">

        <div class="logo">
            SCIENCE CORE
        </div>

        <div class="status">
            SYSTEM ONLINE
        </div>

    </header>





    <!-- 왼쪽 HUD -->


    <section class="panel left-panel">


        <h2>
            MISSION CONTROL
        </h2>


        <div class="line">
            QUANTUM ENGINE
            <span>ONLINE</span>
        </div>


        <div class="line">
            SOLAR DATABASE
            <span>CONNECTED</span>
        </div>


        <div class="line">
            NAVIGATION
            <span>READY</span>
        </div>



        <div class="scan">

        </div>


    </section>







    <!-- 태양계 중앙 -->


    <section class="solar-system">


        <div class="sun">

            <div class="corona"></div>

        </div>




        <div class="orbit orbit1">
            <div class="planet mercury"></div>
        </div>



        <div class="orbit orbit2">
            <div class="planet venus"></div>
        </div>



        <div class="orbit orbit3">

            <div class="planet earth">

                <div class="cloud"></div>

            </div>

        </div>




        <div class="orbit orbit4">

            <div class="planet mars"></div>

        </div>





        <div class="orbit orbit5">

            <div class="planet jupiter">

                <div class="spot"></div>

            </div>

        </div>






        <div class="orbit orbit6">

            <div class="planet saturn">

                <div class="ring"></div>

            </div>

        </div>





        <div class="orbit orbit7">

            <div class="planet uranus"></div>

        </div>





        <div class="orbit orbit8">

            <div class="planet neptune"></div>

        </div>



    </section>








    <!-- 오른쪽 정보창 -->


    <section class="panel right-panel">


        <h2>
            SOLAR DATA
        </h2>


        <div class="data">

            <p>
            PLANETS : 8
            </p>


            <p>
            STAR TYPE : G2V
            </p>


            <p>
            MISSION :
            EXPLORATION
            </p>


            <p>
            DISTANCE :
            149.6M KM
            </p>


        </div>



        <div class="coordinates">

            X 2847<br>
            Y 0912<br>
            Z 4470

        </div>



    </section>







    <!-- 하단 시작 버튼 -->


    <button id="start">

        START MISSION

    </button>







    <!-- 하단 로그 -->


    <footer>


        <div>
        // SCIENCE CORE INITIALIZED
        </div>


        <div>
        // AWAITING COMMAND
        </div>


    </footer>



</main>





<script src="script.js"></script>


</body>

</html>
