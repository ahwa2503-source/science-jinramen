<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>태양계</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars"></div>

<h1>🌌 태양계 탐험</h1>
<p>수성부터 해왕성까지 떠나는 우주 여행</p>

<a href="#planets" class="start-btn">🚀 시작하기</a>

<section id="planets">

    <div class="planet mercury">
        <h2>☿ 수성</h2>
        <p>태양과 가장 가까운 행성</p>
    </div>

    <div class="planet venus">
        <h2>♀ 금성</h2>
        <p>가장 뜨거운 행성</p>
    </div>

    <div class="planet earth">
        <h2>🌍 지구</h2>
        <p>우리가 사는 행성</p>
    </div>

    <div class="planet mars">
        <h2>♂ 화성</h2>
        <p>붉은 행성</p>
    </div>

    <div class="planet jupiter">
        <h2>♃ 목성</h2>
        <p>태양계에서 가장 큰 행성</p>
    </div>

    <div class="planet saturn">
        <h2>🪐 토성</h2>
        <p>아름다운 고리를 가진 행성</p>
    </div>

    <div class="planet uranus">
        <h2>♅ 천왕성</h2>
        <p>옆으로 누워 자전하는 행성</p>
    </div>

    <div class="planet neptune">
        <h2>♆ 해왕성</h2>
        <p>푸른 얼음 행성</p>
    </div>

</section>

</body>
</html>
