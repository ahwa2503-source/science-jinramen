<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SCIENCE CORE</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- 우주 배경 -->

<div id="universe">

<div class="nebula nebula1"></div>
<div class="nebula nebula2"></div>

</div>



<!-- 타이틀 -->

<header>

<h1>SCIENCE CORE</h1>

<p>
UNIVERSE EXPLORATION SYSTEM
</p>

</header>




<!-- 태양계 -->


<div class="solar-system">



<!-- 태양 -->

<div class="sun">

<div class="sun-corona"></div>

</div>




<!-- 수성 -->

<div class="orbit o1">

<div class="planet mercury"
data-name="MERCURY"
data-info="태양과 가장 가까운 암석 행성">

</div>

</div>





<!-- 금성 -->

<div class="orbit o2">

<div class="planet venus"
data-name="VENUS"
data-info="강력한 온실효과를 가진 행성">

</div>

</div>





<!-- 지구 -->

<div class="orbit o3">

<div class="planet earth"
data-name="EARTH"
data-info="생명체가 존재하는 유일한 행성">

<div class="clouds"></div>

</div>

</div>





<!-- 화성 -->

<div class="orbit o4">

<div class="planet mars"
data-name="MARS"
data-info="붉은 행성">

</div>

</div>





<!-- 목성 -->

<div class="orbit o5">

<div class="planet jupiter"
data-name="JUPITER"
data-info="태양계 최대 행성">

<div class="storm"></div>

</div>

</div>





<!-- 토성 -->

<div class="orbit o6">


<div class="planet saturn"
data-name="SATURN"
data-info="아름다운 고리를 가진 행성">


<div class="rings"></div>


</div>


</div>






<!-- 천왕성 -->


<div class="orbit o7">


<div class="planet uranus"
data-name="URANUS"
data-info="얼음 거대 행성">

</div>


</div>





<!-- 해왕성 -->


<div class="orbit o8">


<div class="planet neptune"
data-name="NEPTUNE"
data-info="태양계 가장 바깥쪽 행성">

</div>


</div>



</div>





<!-- 중앙 UI -->


<section class="main-ui">


<h2>

EXPLORE<br>
THE UNKNOWN

</h2>



<button id="start">

START EXPLORATION

</button>



</section>






<!-- 정보창 -->


<div class="database">


<h3>
PLANET DATABASE
</h3>


<h2 id="planet-name">
SYSTEM READY
</h2>


<p id="planet-info">

행성을 클릭하세요

</p>


</div>






<div class="scan"></div>





<script src="script.js"></script>


</body>


</html>
